<section id="contact" class="contact-section pt-page">
    <div class="section-container">

        <!--Page Heading-->
        <div class="page-heading">
            <span class="icon"><i class="lnr lnr-envelope"></i></span>
            <h2>Contact Me.</h2>
        </div>

        <!--Form Row-->
        <div class="row mb-70">
            <div class="col-lg-8  offset-lg-2">
                <div class="subheading">
                    <h3>Let's Talk</h3>
                </div>

                <!--Form Start-->
                <form  method="POST" >
                    {% csrf_token %}
                    <div class="row">


                        <!--Name Field-->
                        <div class="col-md-6 mb-50">
                            <span class="input">
                                <input class="input__field cf-validate" type="text" id="cf-name" name="name" />
                                <label class="input__label" for="cf-name">Name</label>
                            </span>
                        </div>

                        <!--Email Field-->
                        <div class="col-md-6 mb-50">
                            <span class="input">
                                <input class="input__field cf-validate" type="email" id="cf-email" name="email" required=""/>
                                <label class="input__label" for="cf-email">Email</label>
                            </span>
                        </div>

                        <!--Message Box-->
                        <div class="col-md-12 mb-30">
                            <span class="input">
                                <textarea  class="input__field cf-validate" id="cf-message" name="message" rows="5"  required=""></textarea>
                                <label class="input__label" for="cf-message">How can we help you?</label>
                            </span>
                        </div>

                        <div class="alert-container col-md-12"></div>

                        <!--Submit Button-->
                        <div class="col-md-12 text-center">
                            <input  class="btn-main" type="submit"  text="Send">
                        </div>


                    </div>
                </form>
                <!--Form End-->

            </div>
        </div>

        <!--Contact Info Row Start-->
        <div class="row contact-info mb-70">

            <!--Contact Info Item-->
            <div class="col-md-4 info-item">
                <span class="icon"><i class="fas fa-paper-plane"></i></span>
                <h5><a href="mailto:rsah3798@gmail.com">rsah3798@gmail.com</a></h5>
            </div>

            <!--Contact Info Item-->
            <div class="col-md-4 info-item">
                <span class="icon"><i class="fas fa-map-marker-alt"></i></span>
                <h5>Kathmandu, Nepal</h5>
            </div>

            <!--Contact Info Item-->
            <div class="col-md-4 info-item">
                <span class="icon"><i class="fas fa-phone"></i></span>
                <h5>(+977) 9862981898</h5>
            </div>

        </div>
        <!--Contact Info Row End-->

    </div>
    <!--Google Map Start-->
    {% comment %} <div class="google-map">
            <div id="map" data-latitude="-37.817214" data-longitude="144.955925" data-zoom="15"></div>
    </div> {% endcomment %}
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2748.0180239781916!2d85.29236067516386!3d27.686582528907316!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb18418484f5cb%3A0x47248c3878873e24!2sBalkhu%2C%20Kathmandu%2044600!5e0!3m2!1sen!2snp!4v1695000953373!5m2!1sen!2snp" width="100%%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    <!--Google Map End-->
</section>
